<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
     <link href="./output.css" rel="stylesheet">
</head>
<body class="bg-purple-800 flex flex-col  items-center p-4 min-h-screen w-full gap-7">
    <div class="title mb-5">
        <h1 class="text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-red-700 font-bold shadow-amber-300 text-center text-6xl pt-10">Tic-Tac-Toe</h1>
    </div>
    <div class=" flex justify-center">
        <span class="winDecision text-red-600 font-bold text-2xl"></span>
    </div>
   <div class="board grid grid-cols-3 gap-4 mt-20">
        <div class="cell bg-pink-400 w-25 h-25 rounded-2xl flex justify-between items-center" data-row="0" data-col="0"></div>
        <div class="cell bg-pink-400 w-25 h-25 rounded-2xl flex justify-between items-center " data-row="0" data-col="1"></div>
        <div class="cell bg-pink-400 w-25 h-25 rounded-2xl flex justify-between items-center  " data-row="0" data-col="2"></div>
        <div class="cell bg-pink-400 w-25 h-25 rounded-2xl flex justify-between items-center  " data-row="1" data-col="0"></div>
        <div class="cell bg-pink-400 w-25 h-25 rounded-2xl flex justify-between items-center " data-row="1" data-col="1"></div>
        <div class="cell bg-pink-400 w-25 h-25 rounded-2xl flex justify-between items-center "data-row="1" data-col="2"></div>
        <div class="cell bg-pink-400 w-25 h-25 rounded-2xl flex justify-between items-center "data-row="2" data-col="0"></div>
        <div class="cell bg-pink-400 w-25 h-25 rounded-2xl flex justify-between items-center " data-row="2" data-col="1"></div>
        <div class="cell bg-pink-400 w-25 h-25 rounded-2xl flex justify-between items-center" data-row="2" data-col="2"></div>
   </div>
   <div class="query flex flex-row justify-center mt-5 gap-7">
     <span class="pt-2 font-bold">Player 1 select your choice  do you want 
        <span class=" text-2xl font-bold text-red-600 px-1">X</span> or <span class=" text-2xl font-bold text-red-600 px-1">O</span></span>
     <div class="choose flex flex-row gap-5 pt-2">
        <button class="X  bg-gradient-to-r from-red-200 via-blue-700 to-green-900  rounded-3xl w-40 h-10 text-2xl font-bold text-red-600">X</button>
        <button class="O bg-gradient-to-r from-red-200 via-blue-700 to-green-900  rounded-3xl w-40 h-10 text-2xl font-bold text-red-600 ">O</button>
     </div>
   </div>
   <div class="resetGame  flex flex-row justify-center mt-5 ">
        <button class="resetCall w-40 h-12 bg-green-500 text-black text-2xl font-bold rounded-3xl ">Reset Game</button>
   </div>

   <script src="./script.js"></script>
</body>
</html>
